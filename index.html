<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edit Sanrio Putra - Mobile Developer Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230b0f19%22/><path d=%22M30 35 L45 50 L30 65 M70 35 L55 50 L70 65%22 stroke=%22%238b5cf6%22 stroke-width=%228%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 fill=%22none%22/></svg>">
</head>
<body>
    <div class="blob-bg"></div>
    <div class="blob-bg blob-2"></div>
    
    <header class="glass-header">
        <nav class="nav-container">
            <div class="logo">
                <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                    <rect width="100" height="100" rx="20" fill="transparent" stroke="url(#logo-grad)" stroke-width="4"/>
                    <path d="M30 35 L45 50 L30 65 M70 35 L55 50 L70 65" stroke="url(#logo-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <defs>
                        <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="var(--gradient-1)" />
                            <stop offset="100%" stop-color="var(--gradient-2)" />
                        </linearGradient>
                    </defs>
                </svg>
                ESP.
            </div>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="hero" class="hero-section">
            <div class="container hero-content">
                <p class="greeting">Hi there, I'm</p>
                <h1 id="hero-name">Name</h1>
                <h2 id="hero-title">Title</h2>
                <p id="hero-summary" class="summary-text"></p>
                <div class="hero-actions">
                    <a href="#projects" class="btn btn-primary">View My Work</a>
                    <a href="#contact" class="btn btn-secondary">Get In Touch</a>
                </div>
            </div>
        </section>

        <section id="skills" class="skills-section">
            <div class="container">
                <h3 class="section-title">Technical Skills</h3>
                <div id="skills-container" class="skills-grid">
                    <!-- Skills will be populated here by main.js -->
                </div>
            </div>
        </section>

        <section id="projects" class="projects-section">
            <div class="container">
                <h3 class="section-title">Featured Projects</h3>
                <div id="projects-container" class="projects-grid">
                    <!-- Projects will be populated here by main.js -->
                </div>
            </div>
        </section>
        
        <section id="contact" class="contact-section">
            <div class="container">
                <div class="glass-card contact-card text-center">
                    <h3 class="section-title">Let's Connect</h3>
                    <p>I'm always open to discussing product design work or partnership opportunities.</p>
                    <div class="contact-info">
                        <p id="contact-email"></p>
                        <p id="contact-phone"></p>
                        <p id="contact-location"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container text-center">
            <p>&copy; <span id="current-year"></span> Edit Sanrio Putra. All rights reserved.</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
